<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - VisionAnnotate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="va-workspace-nav d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2 gap-md-4">
            <a href="dashboard.html" class="va-brand">
                <i class="bi bi-eye-fill va-brand-icon"></i>
                <span class="d-none d-md-inline">VisionAnnotate</span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <span id="projectTitleDisplay" class="text-white font-monospace text-truncate d-inline-block"
                    style="font-size: 0.9rem; max-width: 120px;">Loading...</span>
                <span class="badge-forked d-none d-sm-inline-block">Forked</span>
            </div>
            <div id="viewModeBanner" class="view-mode-banner d-none">
                <i class="bi bi-eye"></i> Viewing version (Read-only)
            </div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-secondary-dark btn-sm px-2 px-md-3">
                <i class="bi bi-cloud-arrow-up d-inline d-md-none"></i>
                <span class="d-none d-md-inline">Save Branch</span>
            </button>
            <button class="btn btn-primary btn-sm px-2 px-md-3">
                <i class="bi bi-download d-inline d-md-none"></i>
                <span class="d-none d-md-inline">Export Data</span>
            </button>
        </div>
    </nav>

    <div class="workspace-container">
        <div class="workspace-main">

            <div class="video-wrapper" id="videoContainer">
                <div id="ytplayer" class="video-iframe"></div>
                <canvas id="annotationCanvas" class="canvas-layer"></canvas>
            </div>
            <div id="floatingActionMenu" class="floating-action-menu" style="display: none;">
                <button id="floatingRenameBtn" class="action-btn rename-btn" title="Rename">
                    <i class="bi bi-pencil"></i>
                </button>
                <button id="floatingTrashBtn" class="action-btn trash-btn" title="Delete Box">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

            <div class="player-controls">
                <button class="btn-play" id="playPauseBtn">
                    <i class="bi bi-play-fill" id="playIcon"></i>
                </button>

                <div class="d-flex gap-1">
                    <button class="btn-frame" id="prevFrameBtn" title="Previous Frame"><i
                            class="bi bi-skip-start-fill"></i></button>
                    <button class="btn-frame" id="nextFrameBtn" title="Next Frame"><i
                            class="bi bi-skip-end-fill"></i></button>
                </div>

                <div class="time-display" id="currentTimeDisplay">00:00</div>

                <div class="progress-container" id="progressBarContainer">
                    <div class="progress-bar-fill" id="progressBar"></div>
                    <div class="progress-handle"></div>
                </div>

                <div class="time-display" id="durationDisplay">00:00</div>

                <button class="btn-icon"><i class="bi bi-gear"></i></button>
            </div>

            <div class="scrub-timeline-section">
                <canvas id="scrubTimeline" class="scrub-timeline-canvas"></canvas>
            </div>

            <div class="community-section">
                <div class="community-header">COMMUNITY VERSIONS (WORKSPACE FORKING)</div>
                <div class="d-flex gap-2" id="userCarousel">
                </div>
            </div>
        </div>

        <div class="workspace-sidebar">
            <div class="sidebar-panel">
                <div class="panel-header">
                    <div><i class="bi bi-pin-map me-2"></i>Coordinates</div>
                    <div class="panel-badge" id="coordCountBadge">0</div>
                </div>
                <div class="coord-table-header">
                    <div>Label</div>
                    <div>X</div>
                    <div>Y</div>
                    <div>Frame</div>
                </div>
                <div id="coordinatesList"></div>
            </div>

            <div class="sidebar-panel">
                <div class="panel-header">
                    <div><i class="bi bi-layers"></i> CLASSIFICATION & TIME</div>
                </div>

                <div class="mb-2">
                    <label class="form-label">Category Tag</label>
                    <select id="tag-select" class="form-select va-input-bg">
                        <option value="">Loading tags...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Action State</label>
                    <select id="state-select" class="form-select va-input-bg">
                        <option value="">Loading states...</option>
                    </select>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label">Start (s)</label>
                        <div class="input-group">
                            <input type="number" id="start-time-input" class="form-control va-input-bg" step="0.1"
                                value="0.00">
                            <button class="btn btn-outline-secondary" id="set-start-btn" title="Capture Player Time"><i
                                    class="bi bi-geo-alt"></i></button>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Stop (s)</label>
                        <div class="input-group">
                            <input type="number" id="end-time-input" class="form-control va-input-bg" step="0.1"
                                value="0.00">
                            <button class="btn btn-outline-secondary" id="set-end-btn" title="Capture Player Time"><i
                                    class="bi bi-geo-alt"></i></button>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn-state btn-start" id="quick-start-btn"><i class="bi bi-play-circle"></i> Mark
                        Start</button>
                    <button class="btn-state btn-stop" id="quick-stop-btn"><i class="bi bi-stop-circle"></i> Mark
                        Stop</button>
                </div>
            </div>

            <div class="sidebar-panel"
                style="flex: 1; display: flex; flex-direction: column; border-bottom: none; padding-bottom: 0;">
                <div class="panel-header">
                    <div><i class="bi bi-three-dots-vertical"></i> EVENT TIMELINE</div>
                    <div class="panel-badge" id="eventCountBadge">0 logs</div>
                </div>

                <div class="timeline-container" id="eventsTimelineList" style="flex: 1; overflow-y: auto;">
                </div>
            </div>

            <div class="note-input-container">
                <div class="position-relative d-flex flex-column gap-2">
                    <textarea id="event-comment" class="note-input" placeholder="Add annotation details..."
                        rows="2"></textarea>
                    <button id="save-event-btn" class="btn btn-primary w-100">
                        <i class="bi bi-plus-circle me-2"></i>Save Record
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/utils.js"></script>
    <script src="js/app-state.js"></script>
    <script src="js/youtube-player.js"></script>
    <script src="js/canvas-engine.js"></script>
    <script src="js/canvas-editor.js"></script>
    <script src="js/ui-ux-polish.js"></script>
    <script src="js/workspace-manager.js"></script>
    <script src="js/timeline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
