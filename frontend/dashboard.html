<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - VisionAnnotate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="va-navbar d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-4">
            <a href="dashboard.html" class="va-brand">
                <i class="bi bi-eye-fill va-brand-icon"></i>
                VisionAnnotate
            </a>
            <div class="d-flex gap-2">
                <a href="#" class="va-nav-link active">Dashboard</a>
                <a href="index.html" class="va-nav-link">Main Workspace</a>
            </div>
        </div>
        <div>
            <div class="va-avatar" style="cursor: pointer;" onclick="window.location.href='login.html'"
                title="Sign out">
                <i class="bi bi-person"></i>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 1200px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1">My Annotated Videos</h2>
                <p class="text-muted">Manage and branch your spatial datasets.</p>
            </div>
            <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal"
                data-bs-target="#newProjectModal">
                <i class="bi bi-layers"></i>
                New Project
            </button>
        </div>

        <div class="row g-4" id="projectsGrid">
        </div>

    </div>

    <div class="modal fade" id="newProjectModal" tabindex="-1" aria-labelledby="newProjectModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content va-modal">
                <div class="modal-header va-modal-header">
                    <h5 class="modal-title" id="newProjectModalLabel">Create New Project</h5>
                    <button type="button" class="btn-close-va" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body va-modal-body">
                    <div class="mb-4">
                        <label for="projectName" class="form-label">Project Name</label>
                        <input type="text" class="form-control" id="projectName"
                            placeholder="e.g., Intersection Cam 02">
                    </div>
                    <div>
                        <label for="videoUrl" class="form-label">Video Source URL</label>
                        <div class="input-group">
                            <span class="input-group-text va-input-icon"><i class="bi bi-link-45deg"></i></span>
                            <input type="text" class="form-control va-input-with-icon" id="videoUrl"
                                placeholder="https://youtube.com/... or .mp4 link">
                        </div>
                        <div class="form-text mt-2 text-muted" style="font-size: 0.8rem;">Paste a link to a YouTube
                            video, Vimeo, or direct MP4 file.</div>
                    </div>
                </div>
                <div class="modal-footer va-modal-footer">
                    <button type="button" class="btn btn-secondary-dark" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="createProjectBtn">Create Project</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
