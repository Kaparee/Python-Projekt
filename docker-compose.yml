services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    container_name: visionannotate_postgres
    restart: always
    ports:
      - "5442:5432"
    volumes:
      - visionannotate_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visionannotate_admin -d VisionAnnotate"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - visionannotate_network

networks:
  visionannotate_network:
    driver: bridge

volumes:
  visionannotate_data: