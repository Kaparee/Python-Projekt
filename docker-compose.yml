services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    container_name: visionannotate_postgres
    restart: always
    ports:
      - "5442:5432"
    volumes:
      - visionannotate_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visionannotate_admin -d VisionAnnotate"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - visionannotate_network

  backend:
    build: ./backend
    container_name: visionannotate_api
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - visionannotate_network

  frontend:
    image: nginx:alpine
    container_name: visionannotate_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: always
    networks:
      - visionannotate_network

networks:
  visionannotate_network:
    driver: bridge

volumes:
  visionannotate_data: